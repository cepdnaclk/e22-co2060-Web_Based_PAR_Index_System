spring:
  application:
    name: par-index-system

  datasource:
    url: jdbc:mysql://localhost:3306/par_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: HAhamed03@
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 160MB

server:
  port: 9090
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: cGFyc3lzdGVtc2VjcmV0a2V5Zm9yand0dG9rZW5nZW5lcmF0aW9u
    expiration-ms: 86400000

  storage:
    base-dir: ./uploads
    clinical-dir: clinical
    training-dir: training

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.parsystem: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
